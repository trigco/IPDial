name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Free Edition (Debug)
        run: ./gradlew assembleFreeDebug

      - name: Get version
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=v-manual" >> $GITHUB_OUTPUT
          fi

      - name: Prepare APKs
        run: |
          mkdir -p release_artifacts
          # Free Edition APKs
          find app/build/outputs/apk/free/debug/ -name "*universal-debug.apk" -exec cp {} release_artifacts/IPDial-Free-${{ steps.get_version.outputs.VERSION }}-universal.apk \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: "IPDial Free ${{ steps.get_version.outputs.VERSION }}"
          body: |
            ## 🚀 IPDial Free ${{ steps.get_version.outputs.VERSION }}
            
            This is the **Free Edition** of IPDial.
            
            ### ✨ Features
            - Modern VoIP interface
            - HD Audio support
            - Single SIP account support
            - Advanced Echo Cancellation
            
            ### 📦 Installation
            1. Download the **universal.apk** below.
            2. Open the file on your Android device.
            3. If prompted, allow "Install from unknown sources".
          files: release_artifacts/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
